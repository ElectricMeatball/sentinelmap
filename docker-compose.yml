services:
  app:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required — copy .env.example to .env}
      - DATABASE_URL=postgresql://aeroguard:${POSTGRES_PASSWORD:-aeroguard}@db:5432/aeroguard
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/feeds/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aeroguard
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aeroguard}
      - POSTGRES_DB=aeroguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroguard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
