# ─── SentinelMap — Docker Compose ─────────────────────────────────────────────
# Single-VPS deployment. Optionally add the `db` service for PostgreSQL.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#
services:
  app:
    build: .
    container_name: sentinelmap
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Uncomment and set if using PostgreSQL:
      # - DATABASE_URL=postgresql://sentinelmap:changeme@db:5432/sentinelmap
      - SESSION_SECRET=${SESSION_SECRET:-changeme-in-production}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/feeds/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Uncomment to link to PostgreSQL:
    # depends_on:
    #   db:
    #     condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Optional PostgreSQL ──────────────────────────────────────────────────────
  # Uncomment to add persistent storage:
  #
  # db:
  #   image: postgres:16-alpine
  #   container_name: sentinelmap-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: sentinelmap
  #     POSTGRES_USER: sentinelmap
  #     POSTGRES_PASSWORD: changeme
  #   volumes:
  #     - sentinelmap_db:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U sentinelmap"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  # Uncomment for production TLS with Nginx:
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: sentinelmap-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - app

volumes:
  sentinelmap_db:

networks:
  default:
    name: sentinelmap-net
